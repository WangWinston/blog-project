spring:
  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: blog
    password: blog123

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# JWT
jwt:
  secret: blog-dev-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 7200000
  refresh-expiration: 604800000

# GitHub OAuth
github:
  oauth:
    client-id: your-github-client-id
    client-secret: your-github-client-secret
    redirect-uri: http://localhost:8080/api/auth/github/callback

# Logging
logging:
  level:
    com.blog: debug