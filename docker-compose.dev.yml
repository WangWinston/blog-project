# Docker Compose for Blog Project
# Development environment

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: blog-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - blog-backend
    networks:
      - blog-network

  blog-backend:
    build:
      context: ./blog-backend
      dockerfile: Dockerfile.dev
    container_name: blog-backend-dev
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
    ports:
      - "8080:8080"
    volumes:
      - ./blog-backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - blog-network

  mysql:
    image: mysql:8.0
    container_name: blog-mysql-dev
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=blog
      - MYSQL_USER=blog
      - MYSQL_PASSWORD=blog123
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blog-redis-dev
    ports:
      - "6379:6379"
    networks:
      - blog-network

volumes:
  mysql-dev-data:

networks:
  blog-network:
    driver: bridge